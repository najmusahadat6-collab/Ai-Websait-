<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LO VI AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <header>
    <h1>🤖 LO VI AI</h1>
    <p>Your Personal AI Assistant</p>
  </header>

  <div id="chatBox" class="chat-box">

    <div class="bot">
      👋 Hello! I'm LO VI AI.<br>
      Ask me anything.
    </div>

  </div>

  <div class="input-area">

    <textarea
      id="prompt"
      placeholder="Type your message..."
    ></textarea>

    <button id="sendBtn">
      Send
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
